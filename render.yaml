services:
  - type: web
    name: shopify-saas-fastapi
    env: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: API_VERSION
        value: 2026-04
      - key: DATABASE_URL
        value: sqlite:///./shopify.db
      - key: LOG_LEVEL
        value: INFO
