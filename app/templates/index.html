<!DOCTYPE html>
<html>

<head>
  <title>Gallery Manager</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    .gallery {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .item {
      border: 1px solid #ccc;
      padding: 5px;
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <h2>Gallery</h2>

  <input type="file" id="fileInput">
  <button onclick="upload()">Upload</button>

  <div class="gallery" id="gallery"></div>

  <script>
    const shop = "6uxkvv-2d.myshopify.com"
    const productId = "gid://shopify/Product/15588924457304"

    async function loadGallery() {
      const res = await fetch(`/gallery/get?shop=${shop}&product_id=${productId}`)
      const data = await res.json()

      const container = document.getElementById("gallery")
      container.innerHTML = ""

      data.forEach(img => {
        const div = document.createElement("div")
        div.className = "item"
        div.innerHTML = `<img src="${img.url}" />`
        container.appendChild(div)
      })
    }

    async function upload() {
      const file = document.getElementById("fileInput").files[0]

      const form = new FormData()
      form.append("shop", shop)
      form.append("file", file)

      const res = await fetch("/upload", {
        method: "POST",
        body: form
      })

      const uploaded = await res.json()

      await fetch("/gallery/add", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          file_id: uploaded.id
        })
      })

      loadGallery()
    }

    loadGallery()
  </script>

</body>

</html>
