<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <title>Shopify Media Manager</title>

  <style>
    body {
      margin: 0;
      background: #f6f6f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #202223;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    .card {
      background: #fff;
      border: 1px solid #e1e3e5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .item {
      background: #fff;
      border: 1px solid #dfe3e8;
      border-radius: 10px;
      padding: 8px;
      cursor: grab;
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .button {
      background: #008060;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
    }

    .danger {
      color: #d72c0d;
      border: 1px solid #d72c0d;
      background: #fff;
      border-radius: 6px;
      padding: 6px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .product-card {
      cursor: pointer;
      transition: .15s;
    }

    .product-card:hover {
      box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
      transform: translateY(-1px);
    }

    .selected {
      border: 2px solid #008060;
    }

    .product-row {
      border-bottom: 1px solid #ddd;
      padding: 20px 0;
    }

    .image-grid {
      display: flex;
      gap: 20px;
    }

    .image-slot {
      background: #1e2a38;
      padding: 15px;
      border-radius: 8px;
      width: 200px;
    }


    .image-row {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }

    .product-image {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #f6f6f7;
    }

    .preview {
      margin-top: 10px;
      color: #aaa;
    }

    .product-manager {
      background: #fff;
      border: 1px solid #e1e3e5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .product-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .product-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .media-card,
    .upload-card {
      border: 1px solid #dfe3e8;
      border-radius: 10px;
      padding: 8px;
      background: #fafbfb;
      min-height: 160px;
    }

    .media-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .media-card button {
      margin-top: 8px;
      width: 100%;
    }

    .upload-card {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #008060;
      font-weight: 600;
    }

    .variant-list {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .variant-pill {
      background: #f1f2f3;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }
  </style>

</head>

<body>
  <div class="page">

    <h1>Media Manager</h1>

    <!-- PRODOTTI -->
    <div class="card">
      <h2>Gestione immagini prodotti</h2>
      <div id="products"></div>
    </div>

    <!-- UPLOAD -->
    <div class="card">
      <h2>Upload immagini</h2>
      <input id="fileInput" type="file" multiple>
      <button class="button" onclick="upload()">Upload</button>
      <p id="status"></p>
    </div>

    <!-- GALLERY -->
    <div class="card">
      <h2>Gallery</h2>
      <button class="button" onclick="saveOrder()">Salva ordine</button>
      <div id="gallery" class="gallery"></div>
    </div>

  </div>

  <script>
    const shop = "6uxkvv-2d.myshopify.com"

    let productId = null
    let galleryData = []
    let draggedIndex = null

    // 🔥 LOAD PRODUCTS
    async function loadProducts() {
      const res = await fetch(`/products?shop=${shop}`)
      const products = await res.json()

      const container = document.getElementById("products")
      container.innerHTML = ""

      products.forEach(product => {
        const row = document.createElement("div")
        row.className = "product-manager"

        row.innerHTML = `
      <div class="product-header">
        <h2>${product.title}</h2>
        <span>${product.images.length} foto</span>
      </div>

      <div class="media-grid" id="media-${cssSafe(product.id)}">
        ${product.images.map(img => `
          <div class="media-card">
            <img src="${img.url}">
            <button onclick="deleteMedia('${product.id}', '${img.id}')">Elimina</button>
          </div>
        `).join("")}

        <label class="upload-card">
          <input type="file" multiple accept="image/*" hidden onchange="uploadToProduct('${product.id}', this.files)">
          <strong>+ Aggiungi foto</strong>
        </label>
      </div>

      <div class="variant-list">
        ${product.variants.map(v => `
          <span class="variant-pill">${v.title}</span>
        `).join("")}
      </div>
    `

        container.appendChild(row)
      })
    }

    function cssSafe(id) {
      return id.replaceAll("/", "-").replaceAll(":", "-")
    }

    // 🔥 RENDER
    function renderGallery() {
      const container = document.getElementById("gallery")
      container.innerHTML = ""

      galleryData.forEach((img, index) => {
        const div = document.createElement("div")
        div.className = "item"
        div.draggable = true
        div.dataset.index = index

        div.innerHTML = `
      <img src="${img.url}">
      <button class="danger" onclick="removeImage('${img.id}')">X</button>
    `

        div.addEventListener("dragstart", () => draggedIndex = index)
        div.addEventListener("dragover", e => e.preventDefault())

        div.addEventListener("drop", () => {
          const moved = galleryData.splice(draggedIndex, 1)[0]
          galleryData.splice(index, 0, moved)
          renderGallery()
        })

        container.appendChild(div)
      })
    }

    // 🔥 UPLOAD
    async function upload() {
      if (!productId) {
        alert("Seleziona prima un prodotto")
        return
      }

      const files = document.getElementById("fileInput").files

      for (const file of files) {
        document.getElementById("status").innerText = "Uploading..."

        const form = new FormData()
        form.append("shop", shop)
        form.append("file", file)

        const res = await fetch("/upload", { method: "POST", body: form })
        const uploaded = await res.json()

        await fetch("/gallery/add", {
          method: "POST",
          body: new URLSearchParams({
            shop: shop,
            product_id: productId,
            file_id: uploaded.id
          })
        })
      }

      document.getElementById("status").innerText = "Done ✅"
      loadGallery()
    }

    // 🔥 SAVE ORDER
    async function saveOrder() {
      const ids = galleryData.map(i => i.id)

      await fetch("/gallery/reorder", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          file_ids: JSON.stringify(ids)
        })
      })

      alert("Ordine salvato")
    }

    // 🔥 REMOVE
    async function removeImage(id) {
      galleryData = galleryData.filter(i => i.id !== id)
      await saveOrder()
      loadGallery()
    }


    async function uploadToProduct(productId, files) {
      for (const file of files) {
        const form = new FormData()
        form.append("shop", shop)
        form.append("product_id", productId)
        form.append("file", file)

        await fetch("/upload-product-image", {
          method: "POST",
          body: form
        })
      }

      await loadProducts()
    }

    async function deleteMedia(productId, mediaId) {
      if (!confirm("Eliminare questa foto dal prodotto?")) return

      await fetch("/product/media/delete", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          media_id: mediaId
        })
      })

      await loadProducts()
    }
    // INIT
    loadProducts()
  </script>

</body>

</html>
