<!DOCTYPE html>
<html>

<head>
  <title>Gallery Manager</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    .gallery {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .item {
      border: 1px solid #ccc;
      padding: 5px;
    }

    img {
      width: 120px;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <h2>Gallery</h2>

  <input type="file" id="fileInput">
  <button onclick="upload()">Upload</button>

  <div class="gallery" id="gallery"></div>

  <script>
    const shop = "6uxkvv-2d.myshopify.com"
    const productId = "gid://shopify/Product/15588924457304"

    let galleryData = []

    async function loadGallery() {
      const res = await fetch(`/gallery/get?shop=${shop}&product_id=${productId}`)
      galleryData = await res.json()

      renderGallery()
    }

    function renderGallery() {
      const container = document.getElementById("gallery")
      container.innerHTML = ""

      galleryData.forEach((img, index) => {
        const div = document.createElement("div")
        div.className = "item"
        div.draggable = true
        div.dataset.index = index

        div.innerHTML = `
      <img src="${img.url}" />
      <button onclick="removeImage('${img.id}')">❌</button>
    `

        // DRAG EVENTS
        div.addEventListener("dragstart", dragStart)
        div.addEventListener("dragover", dragOver)
        div.addEventListener("drop", drop)

        container.appendChild(div)
      })
    }

    let draggedIndex = null

    function dragStart(e) {
      draggedIndex = e.currentTarget.dataset.index
    }

    function dragOver(e) {
      e.preventDefault()
    }

    function drop(e) {
      const targetIndex = e.currentTarget.dataset.index

      const moved = galleryData.splice(draggedIndex, 1)[0]
      galleryData.splice(targetIndex, 0, moved)

      renderGallery()
    }

    async function saveOrder() {
      const ids = galleryData.map(i => i.id)

      await fetch("/gallery/reorder", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          file_ids: JSON.stringify(ids)
        })
      })

      alert("Ordine salvato ✅")
    }

    async function removeImage(fileId) {
      const ids = galleryData.filter(i => i.id !== fileId).map(i => i.id)

      await fetch("/gallery/reorder", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          file_ids: JSON.stringify(ids)
        })
      })

      loadGallery()
    }

    async function upload() {
      const file = document.getElementById("fileInput").files[0]

      const form = new FormData()
      form.append("shop", shop)
      form.append("file", file)

      const res = await fetch("/upload", {
        method: "POST",
        body: form
      })

      const uploaded = await res.json()

      await fetch("/gallery/add", {
        method: "POST",
        body: new URLSearchParams({
          shop: shop,
          product_id: productId,
          file_id: uploaded.id
        })
      })

      loadGallery()
    }

    loadGallery()
  </script>

</body>

</html>
